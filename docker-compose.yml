version: '3.8'

services:
  pulsedesk:
    build: .
    container_name: pulsedesk
    ports:
      - "8080:8080"
    environment:
      # HuggingFace config — pass these from your .env file
      - HUGGINGFACE_API_URL=${HUGGINGFACE_API_URL}
      - HUGGINGFACE_API_MODEL=${HUGGINGFACE_API_MODEL}
      - HUGGINGFACE_API_TOKEN=${HUGGINGFACE_API_TOKEN}
      - HUGGINGFACE_API_TIMEOUT=${HUGGINGFACE_API_TIMEOUT:-30000}
    restart: on-failure


















