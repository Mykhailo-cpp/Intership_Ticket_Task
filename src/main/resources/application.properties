spring.application.name=pulsedesk
server.port=8080

spring.datasource.url=jdbc:h2:mem:pulsedeskdb;
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

logging.level.com.ibm.pulsedesk=INFO
logging.level.org.springframework.web=WARN

huggingface.api.url=${HUGGINGFACE_API_URL:https://router.huggingface.co/v1/chat/completions}
huggingface.api.model=${HUGGINGFACE_API_MODEL:Qwen/Qwen2.5-72B-Instruct}
huggingface.api.token=${HUGGINGFACE_API_TOKEN:YOUR_TOKEN_HERE}
huggingface.api.timeout=${HUGGINGFACE_API_TIMEOUT:30000}